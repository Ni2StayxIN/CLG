<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>新增用户</title>
    <link rel="stylesheet" th:href="@{'/bootstrap/css/bootstrap.min.css'}"/>
    <style>#container { width: 600px; margin: 10px auto; }</style>
    <script type="text/javascript" th:src="@{'/js/jquery.js'}"></script>
</head>
<body>
<div id="container">
    <form class="form-horizontal" th:action="@{/sysUser/add}" method="post">
        <div class="form-group">
            <label class="col-sm-2 control-label">账号</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" placeholder="请输入账号" name="username" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">密码</label>
            <div class="col-sm-10">
                <input type="password" class="form-control" placeholder="请输入密码" name="password" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">角色：</label>
            <div class="col-sm-10">
                <select class="form-control" multiple name="roles" style="height:100px">
                    <option th:each="role:${roleList}" th:value="${role.id}" th:text="${role.name}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
