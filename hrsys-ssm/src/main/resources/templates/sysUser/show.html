<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{'/bootstrap/css/bootstrap.min.css'}"/>
    <style>
        #container { width: 600px; margin: 10px auto; }
        #container .selected { background: #337ab7 }
    </style>
    <script type="text/javascript" th:src="@{'/js/jquery.js'}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var ctx = [[@{/}]];
        $(document).ready(function () {
            $("#add").click(function () {
                location.href = ctx + "sysUser/showAdd";
            })
            var id = -1;
            $(".data").click(function () {
                $(".data").removeClass("selected");
                $(this).addClass("selected");
                id = $(this).data("id");
            })
            $("#update").click(function () {
                if (id > -1) {
                    location.href = ctx + "sysUser/showUpdate?id=" + id;
                } else {
                    alert("请选中数据");
                }
            })
            $("#delete").click(function () {
                if (id > -1) {
                    if (confirm("确定要删除该用户吗？")) {
                        location.href = ctx + "sysUser/delete?id=" + id;
                    }
                } else {
                    alert("请选中数据");
                }
            })
        })
        /*]]>*/
    </script>
</head>
<body>
<div id="container">
    <table class="table table-striped table-bordered table-hover">
        <tr>
            <th>ID</th>
            <th>账号</th>
            <th>角色</th>
        </tr>
        <tr class="data" th:each="sysUser:${list}" th:data-id="${sysUser.id}">
            <td th:text="${sysUser.id}"></td>
            <td th:text="${sysUser.username}"></td>
            <td>
                <span class="label label-primary" th:each="role:${sysUser.roles}" th:text="${role.name}" style="margin-right:5px"></span>
            </td>
        </tr>
    </table>
    <button type="button" class="btn btn-primary" id="add">新增</button>
    <button type="button" class="btn btn-primary" id="update">修改</button>
    <button type="button" class="btn btn-danger" id="delete">删除</button>
</div>
</body>
</html>
