<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>后台管理页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #top, #bottom {
            clear: both;
            height: 80px;
            background: #337ab7;
        }

        #top #logo {
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            padding: 15px 0 0 40px;
            float: left;
        }

        #user-info {
            float: right;
            line-height: 80px;
            margin-right: 30px;
            color: #fff;
            font-size: 14px;
        }

        #user-info a {
            color: #ffd966;
            margin-left: 15px;
            text-decoration: none;
        }

        #main {
            margin-top: 10px;
            overflow: hidden;
        }

        a {
            color: #fff;
            text-decoration: none;
        }

        #left {
            width: 240px;
            float: left;
            height: 460px;
            padding-left: 20px;
        }

        #right {
            width: 800px;
            float: left;
            height: 460px;
        }

        .yi {
            width: 160px;
            height: 40px;
            background: #337ab7;
            color: #fff;
            margin-top: 5px;
            border-radius: 3px;
            text-align: center;
            line-height: 40px;
            cursor: pointer;
        }

        .er {
            list-style: none;
            width: 160px;
        }

        .er li {
            margin-top: 2px;
            text-align: center;
            background: #337aae;
            color: #fff;
            height: 30px;
            line-height: 30px;
            font-size: 14px;
        }
    </style>
    <script type="text/javascript" th:src="@{/js/jquery.js}"></script>
    <script type="text/javascript">
        $().ready(function () {
            $(".yi").click(function () {
                $(this).next().slideToggle(500);
            })
        })
    </script>
</head>
<body>
<div id="container">
    <div id="top">
        <div id="logo">Alan人事管理系统</div>
        <div id="user-info" sec:authorize="isAuthenticated()">
            <span>欢迎：<strong th:text="${user != null ? user.username : '未知用户'}"></strong></span>
            <span th:if="${user != null and user.roles != null}" th:each="role:${user.roles}">【<span th:text="${role.name}"></span>】</span>
            <a th:href="@{/logout}">退出系统</a>
        </div>
    </div>
    <div id="main">
        <div id="left">
            <div sec:authorize="hasAnyRole('EMPLOYEE','MANAGER','ADMIN')">
                <div class="yi">员工管理</div>
                <ul class="er">
                    <li><a th:href="@{/emp/search}" target="right">员工管理</a></li>
                    <li><a th:href="@{/emp/showAdd}" target="right">员工添加</a></li>
                </ul>
            </div>

            <div sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                <div class="yi">部门管理</div>
                <ul class="er">
                    <li><a th:href="@{/dep/search}" target="right">部门管理</a></li>
                    <li><a th:href="@{/dep/showAdd}" target="right">部门添加</a></li>
                </ul>
            </div>

            <div sec:authorize="hasRole('ADMIN')">
                <div class="yi">权限管理</div>
                <ul class="er">
                    <li><a th:href="@{/sysUser/search}" target="right">用户管理</a></li>
                    <li><a th:href="@{/sysRole/search}" target="right">角色管理</a></li>
                    <li><a th:href="@{/sysPermission/search}" target="right">权限管理</a></li>
                </ul>
            </div>
        </div>
        <iframe id="right" name="right" style="border:none; overflow:auto;"
                th:src="@{/emp/search}"></iframe>
    </div>
    <div id="bottom">
    </div>
</div>
</body>
</html>
